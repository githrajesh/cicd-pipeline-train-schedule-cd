name: OWASP ZAP INTERGRATION with Git Actins
on: push
permissions:
    contents: read
    issues: write
jobs:
    zap_scan:
        runs-on: ubuntu-latest
        name: Scan the webapplication
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                ref: master
            - name: ZAP SCAN
              uses: zaproxy/action-baseline@0.14.0
              with:
                target: 'http://testphp.vulnweb.com/'
                rules_file_name: '.zap/rules.tsv'
                cmd_options: '-a'

