name: Run SonarQube with Maven
on: push

jobs:
    build:
        runs-on: ubuntu-lateset
        steps:
            - uses: actions/checkout@v4
            - name: Setup JDK 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'zulu'
                cache: maven
            - name: Build with Maven cloud
              run: mvn -B verify sonar:sonar -Dsonar.projectKey=cicd-pipeline-train-schedule-cd -Dsona.organization=cicd-pipeline-train-schedule-cd -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=$SONAR_TOKEN
              env:
                GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
                SONAR_TOKEN: ${{secrets.SONAR_TOKEN}}